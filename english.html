<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A OPOS AGAPI — English</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --g: #3db54a; --o: #f7941d; --cream: #f7f5f0; --text: #1c1c1e; }
        body { font-family: 'Outfit', sans-serif; background: var(--cream); color: var(--text); margin: 0; }
        #intro { position: fixed; inset: 0; z-index: 9999; background: var(--cream); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 1s ease-in-out; }
        #icirc { animation: rotateDisk 12s linear infinite; width: 220px; }
        @keyframes rotateDisk { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        #nav { position: fixed; top: 0; width: 100%; height: 75px; display: flex; align-items: center; justify-content: space-between; padding: 0 5%; z-index: 1000; background: rgba(247,245,240,0.9); backdrop-filter: blur(10px); }
        .sec { padding: 100px 8%; min-height: 50vh; }
        .h2 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.5rem, 6vw, 4rem); margin-bottom: 20px; }
        .o-txt { color: var(--o); } .g-txt { color: var(--g); }
        footer { padding: 40px; text-align: center; background: #0d0d10; color: white; }
    </style>
</head>
<body>
    <div id="intro">
        <img id="icirc" src="https://raw.githubusercontent.com/Anestis-L/A-OS-AGAPI/main/disk.png">
        <h1 style="font-family: 'Cormorant Garamond', serif;">A OPOS AGAPI</h1>
    </div>
    <nav id="nav">
        <div style="font-weight: 700;">A OPOS AGAPI</div>
        <div style="display:flex; gap:15px; font-size:0.8rem; font-weight:600;">
            <a href="#about" style="text-decoration:none; color:black;">ABOUT</a>
            <a href="#contact" style="text-decoration:none; color:black;">CONTACT</a>
        </div>
    </nav>
    <section id="hero" style="height: 100vh; background: #0d0d10; color: white; display: flex; align-items: center; justify-content: center; text-align: center;">
        <div>
            <h1 style="font-family: 'Cormorant Garamond', serif; font-size: 4rem;">A OPOS <span class="o-txt">AGAPI</span></h1>
            <p>GIVE LOVE, RECEIVE LIGHT</p>
        </div>
    </section>
    <section id="about" class="sec">
        <h2 class="h2">Our <span class="g-txt">Path</span></h2>
        <p>A Non-Profit Organization built on social solidarity and selfless offering.</p>
    </section>
    <footer>&copy; 2026 A OPOS AGAPI</footer>
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => { document.getElementById('intro').style.transform = 'translateY(-100%)'; }, 2000);
        });
    </script>
</body>
</html>
